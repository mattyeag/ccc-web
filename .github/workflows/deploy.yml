name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Replace APP_SCRIPT_URL
        run: |
          sed -i "s|APP_SCRIPT_URL|${{ secrets.APP_SCRIPT_URL }}|g" assets/js/sermons.js

      - name: Verify replacement
        run: |
          if grep -q "APP_SCRIPT_URL" assets/js/sermons.js; then
            echo "Error: APP_SCRIPT_URL was not replaced. Check if the secret is set."
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4